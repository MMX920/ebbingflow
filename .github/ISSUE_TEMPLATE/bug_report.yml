name: Bug Report
description: Report a reproducible bug in EbbingFlow
title: "[Bug]: "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
      placeholder: A clear and concise bug summary.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Exact steps we can follow.
      placeholder: |
        1. Start ...
        2. Send ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      placeholder: What should have happened?
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs / Traceback
      render: shell
  - type: input
    id: environment
    attributes:
      label: Environment
      placeholder: OS, Python, DB backend, runtime mode

